<style>
/* --- 1. 基本リセット --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  background-color: #ffffff;
}

.image-wrapper {
  position: relative;
  width: 100%;
  line-height: 0;
}

.page-image {
  width: 100%;
  display: block;
}

/* --- 2. 共通ボタンデザイン（現在は隠し状態） --- */
.btn-overlay {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  z-index: 100;
  white-space: nowrap;
  padding: 12px 20px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.back { background-color: #cfd8dc; color: #455a64; font-size: 16px; }
.reserve { background-color: #ffd600; color: #000000; font-size: 20px; }

/* --- 3. 19枚目専用：豪華オレンジボタン --- */
.btn-special {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  z-index: 100;
}

/* 「＼ 今すぐチェック！ ／」 */
.check-text {
  color: #d32f2f;
  font-weight: 900;
  font-size: 24px;
  /* ★ここの数字を 8px から 20px に増やしてボタンと離しました */
  margin-bottom: 20px; 
  text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
}

/* ボタン本体 */
.btn-orange-body {
  width: 100%;
  height: 75px;
  background: linear-gradient(to bottom, #ff9d4d, #ff6600);
  border-radius: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 5px 0 #cc5200;
  color: #ffffff;
  font-weight: bold;
  font-size: 20px;
}

/* 黄色いボックス文字 */
.char-box {
  background-color: #ffff00;
  color: #ff4d00;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  margin: 0 1px;
  border-radius: 3px;
  font-size: 20px;
  font-weight: 900;
  vertical-align: middle;
}

/* 矢印マーク */
.arrow-circle {
  background: #fff;
  color: #ff6600;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 10px;
}

.btn-special:active { transform: translateX(-50%) translateY(2px); }
</style>
