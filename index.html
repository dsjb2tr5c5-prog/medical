/* --- 1. 基本設定（PC対策・レスポンシブ） --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  margin: 0 auto;
  max-width: 500px; 
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  background-color: #f5f5f5;
}
.main-content { background-color: #ffffff; min-height: 100vh; }
.image-wrapper { position: relative; width: 100%; line-height: 0; }
.page-image { width: 100%; display: block; }

/* --- 2. オレンジ豪華ボタン（3, 15, 19枚目用） --- */
.btn-special {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 94%; display: flex; flex-direction: column; align-items: center;
  text-decoration: none; z-index: 100;
}
.check-text {
  color: #d32f2f; font-weight: 900; font-size: clamp(14px, 5vw, 22px); 
  margin-bottom: clamp(10px, 3vw, 15px); 
  text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
  white-space: nowrap;
}
.btn-orange-body {
  width: 100%; min-height: clamp(55px, 14vw, 75px); 
  background: linear-gradient(to bottom, #ff9d4d, #ff6600);
  border-radius: 50px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 5px 0 #cc5200; color: #ffffff; font-weight: bold;
  font-size: clamp(11px, 3.5vw, 18px); white-space: nowrap;
}
.char-box {
  background-color: #ffff00; color: #ff4d00; display: inline-flex; align-items: center; justify-content: center;
  width: clamp(20px, 6.2vw, 30px); height: clamp(20px, 6.2vw, 30px);
  margin: 0 0.3vw; border-radius: 3px; font-size: clamp(12px, 4vw, 18px); font-weight: 900;
}

/* --- 3. ピンク詳細ボタン（7, 11枚目用） --- */
.btn-pink-body {
  width: 100%; 
  min-height: clamp(55px, 14vw, 75px); 
  background: linear-gradient(to bottom, #f78da7, #ed5276);
  border-radius: 50px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 0 #c13154; color: #ffffff; font-weight: bold;
  font-size: clamp(14px, 4.5vw, 20px); white-space: nowrap;
}
.arrow-circle {
  background: #fff; color: #ff6600; 
  width: clamp(20px, 5vw, 26px); height: clamp(20px, 5vw, 26px);
  border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 8px;
}
.arrow-pink { color: #ed5276; }

.btn-special:active { transform: translateX(-50%) translateY(2px); }
</style>
